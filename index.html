<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tecno</title>

    <link rel="stylesheet" href="style.css" />

    <script src="productos.js"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="hero">
      <div class="hero-logo">
        <img src="LOGO3.svg" alt="home" class="logo" />
        <button id="btn-carrito" class="carro">
          🛒
          <span id="cart-counter">0</span>
        </button>
      </div>
      <nav class="navbar">
        <ul class="nav-list">
          <li>PlayStation</li>
          <li>Laptops</li>
          <li>Accesories</li>
        </ul>
      </nav>
    </header>
    <div id="toast"></div>
    <main>
      <div class="prueba">
        <div class="title2">
          <h2>¡Productos destacados!</h2>
          <p>Descubrí la mejor tecnología al mejor precio.</p>
        </div>
        <div class="search">
          <input id="search" type="text" placeholder="Search..." />
        </div>
        <button id="back-products" class="back-btn" style="display: none">
          ←
        </button>
      </div>

      <section class="cards"></section>
    </main>
    <div class="modal">
      <div class="modal-content" style="display: none">
        <span class="close-modal">&times;</span>

        <h2>Carrito de Compras</h2>
        <ul id="cart-items"></ul>
        <p id="total-price">Total: $<span id="total-amount">0,00</span></p>
        <button id="btn-comprar">Comprar</button>
      </div>
    </div>
    <div id="order-modal" class="modalo">
      <div class="success-icon">✔</div>
      <div class="modalo-content">
        <h2>¡Gracias por tu compra!</h2>

        <p id="order-number"></p>

        <ul id="order-products"></ul>

        <h3 id="order-total"></h3>

        <button id="close-order">Aceptar</button>
      </div>
    </div>
  </body>
</html>
